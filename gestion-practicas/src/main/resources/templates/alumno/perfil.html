<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FP Connect | Perfil - Alumno</title>
    <!-- Google Fonts: Poppins para títulos, Lato para texto normal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Normalize: resetea estilos raros entre navegadores -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" th:href="@{/css/alumno/perfil.css}">

    <!-- CDN Bootstrap: Necesario para poder utilizar iconos. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar-superior flex-between">
        <div style="width: 200px;"></div> 

        <div class="logo-central">
            <span class="logo-fp">FP</span><span class="logo-connect-span">Connect</span>
        </div>

        <div class="usuario-menu" style="width: 200px; display: flex; justify-content: flex-end;">
            <div class="perfil-trigger" onclick="toggleDropdown()">
                <img th:src="${alumno.usuario.fotoUrl != null ? alumno.usuario.fotoUrl : '/img/default-user.png'}" alt="Foto" class="avatar-nav">
                <span th:text="${alumno.usuario.nombre}">Nombre</span>
                <i class="bi bi-chevron-down"></i>
            </div>
            <div id="dropdown-perfil" class="dropdown-contenido">
                <a th:href="@{/alumno/dashboard}"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="#"><i class="bi bi-gear"></i> Configuración</a>
                <hr>
                <a th:href="@{/logout}" class="cerrar-sesion"><i class="bi bi-box-arrow-right"></i> Salir</a>
            </div>
        </div>
    </nav>
    <main class="contenedor-perfil">
        <section class="perfil-header bloque">
            <div class="perfil-info-main">
                <div class="avatar-grande-container">
                    <img src="/img/default-user.png" class="avatar-perfil">
                </div>
                <div class="texto-header">
                    <h2 th:text="|${alumno.usuario.nombre} ${alumno.usuario.apellidos}|">Nombre Alumno</h2>
                    <p class="ciclo-tag">Desarrollo de Aplicaciones Web</p>
                </div>
            </div>
            <button class="btn-pdf"><i class="bi bi-file-pdf"></i> Descargar CV</button>
        </section>
        <section class="bloque">
            <h3><i class="bi bi-person-lines-fill"></i> Datos Personales</h3>
            <form class="perfil-form">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:value="${alumno.usuario.nombre}">
                </div>
                <div class="form-group">
                    <label>Apellidos</label>
                    <input type="text" th:value="${alumno.usuario.apellidos}">
                </div>
                <div class="form-group">
                    <label>Email (No editable)</label>
                    <input type="email" th:value="${alumno.usuario.correo}" readonly>
                </div>
                <button type="submit" class="btn-guardar">Actualizar Datos</button>
            </form>
        </section>
    </main>
    <script th:src="@{/js/alumno/perfil.js}"></script>
</body>
</html>
