<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Mis Solicitudes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Mis Solicitudes de Prácticas</h1>
        <a href="/alumno/dashboard" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Oferta / Empresa</th>
                <th>Estado</th>
                <th>Mensaje</th>
            </tr>
        </thead>
        <tbody>
            <!-- Si no hay solicitudes -->
            <tr th:if="${#lists.isEmpty(solicitudes)}">
                <td colspan="4" class="text-center">Aún no te has inscrito en ninguna oferta.</td>
            </tr>

            <!-- Bucle para mostrar cada solicitud -->
            <tr th:each="s : ${solicitudes}">
                <td th:text="${#temporals.format(s.fechaSolicitud, 'dd/MM/yyyy')}">01/01/2026</td>
                <td>
                    <strong th:text="${s.oferta.titulo}">Título Oferta</strong><br>
                    <small th:text="${s.oferta.empresa.nombre}">Nombre Empresa</small>
                </td>
                <td>
                    <span th:classappend="${s.estado.name() == 'PENDIENTE' ? 'badge bg-warning' : 
                                       (s.estado.name() == 'ACEPTADA' ? 'badge bg-success' : 'badge bg-danger')}"
                        th:text="${s.estado}">
                        PENDIENTE
                    </span>
                </td>
                <td th:text="${s.mensaje}">Mensaje enviado...</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
