<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro Completo de Usuario</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 300px; padding: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        #seccionAlumno { display: none; background: #f9f9f9; padding: 15px; border-left: 5px solid #28a745; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Formulario de Registro (TFG)</h2>

    <form th:action="@{/usuarios/registrar}" method="post">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" required />
        </div>
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" name="nombre" required />
        </div>
        <div class="form-group">
            <label>Apellidos:</label>
            <input type="text" name="apellidos" required />
        </div>
        <div class="form-group">
            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fNac" required />
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="correo" required />
        </div>
        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" name="pwd" required />
        </div>

        <div class="form-group">
            <label>Rol:</label>
            <select name="rol" id="rolSelect" onchange="mostrarCamposExtra()" required>
                <option value="">-- Selecciona un rol --</option>
                <option value="ALUMNO">Alumno</option>
                <option value="EMPRESA">Empresa</option>
                <option value="TUTOR">Tutor</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>

        <div id="seccionAlumno">
            <div class="form-group">
                <label>Matrícula / Especialidad:</label>
                <select name="matricula">
                    <option value="">-- Selecciona Especialidad --</option>
                    <option value="Informatica">Informática</option>
                    <option value="Administracion">Administración</option>
                    <option value="Peluqueria">Peluquería</option>
                </select>
                <br>
                <label>DNI:</label>
                <input type="text" name="dni"></input>
            </div>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" name="activo" checked style="width: auto;"/> Cuenta activa
            </label>
        </div>

        <button type="submit">Guardar Usuario</button>
    </form>

    <div th:if="${param.exito}" style="color: green; margin-top: 20px;"> ¡Usuario guardado con éxito! </div>
    <div th:if="${param.error}" style="color:red; margin-top:20px;"> Error al registrar. </div>

    <script>
        function mostrarCamposExtra() {
            const rol = document.getElementById("rolSelect").value;
            const seccion = document.getElementById("seccionAlumno");
            // Si es Alumno, mostramos; si no, ocultamos
            seccion.style.display = (rol === "ALUMNO") ? "block" : "none";
        }
    </script>
</body>
</html>
